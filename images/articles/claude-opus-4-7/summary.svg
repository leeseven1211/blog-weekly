<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="1060" cy="112" r="132" fill="#1E293B" opacity="0.7"/>
  <circle cx="1108" cy="78" r="56" fill="url(#accent)" opacity="0.85"/>
  <circle cx="88" cy="548" r="120" fill="#1E293B" opacity="0.55"/>

  <rect x="72" y="64" width="208" height="40" rx="20" fill="#1E293B"/>
  <text x="104" y="91" fill="#F8FAFC" font-size="22" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="700">Anthropic / Claude</text>

  <text x="72" y="180" fill="#F8FAFC" font-size="56" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="700">Claude Opus 4.7</text>
  <text x="72" y="252" fill="#F8FAFC" font-size="40" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="700">更强的不只是代码，更是交付感</text>
  <text x="72" y="310" fill="#CBD5E1" font-size="24" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">我最看重的 4 个变化：复杂编码、高清视觉、自我校验、真实成本。</text>

  <g filter="url(#shadow)">
    <rect x="72" y="374" width="248" height="134" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="344" y="374" width="248" height="134" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="616" y="374" width="248" height="134" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="888" y="374" width="240" height="134" rx="24" fill="#111827" stroke="#334155"/>
  </g>

  <text x="96" y="428" fill="#F59E0B" font-size="20" font-family="sans-serif" font-weight="700">编码 benchmark</text>
  <text x="96" y="472" fill="#F8FAFC" font-size="38" font-family="sans-serif" font-weight="700">+13%</text>
  <text x="96" y="502" fill="#94A3B8" font-size="18" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">官方 93 题编码基准相对 Opus 4.6</text>

  <text x="368" y="428" fill="#F59E0B" font-size="20" font-family="sans-serif" font-weight="700">视觉输入</text>
  <text x="368" y="472" fill="#F8FAFC" font-size="38" font-family="sans-serif" font-weight="700">2576 px</text>
  <text x="368" y="502" fill="#94A3B8" font-size="18" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">长边支持提升到前代 3 倍以上细节</text>

  <text x="640" y="428" fill="#F59E0B" font-size="20" font-family="sans-serif" font-weight="700">API 价格</text>
  <text x="640" y="472" fill="#F8FAFC" font-size="38" font-family="sans-serif" font-weight="700">$5 / $25</text>
  <text x="640" y="502" fill="#94A3B8" font-size="18" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">每百万输入 / 输出 token，单价不变</text>

  <text x="912" y="428" fill="#F59E0B" font-size="20" font-family="sans-serif" font-weight="700">新控制项</text>
  <text x="912" y="472" fill="#F8FAFC" font-size="38" font-family="sans-serif" font-weight="700">xhigh</text>
  <text x="912" y="502" fill="#94A3B8" font-size="18" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">新增 effort 档位，适合编码与 agent</text>

  <text x="72" y="580" fill="#64748B" font-size="18" font-family="'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">基于 Anthropic 官方公告、Pricing、Migration Guide 与官方教程整理</text>
</svg>
