<rect width='1600' height='900' fill='#F8FAFC'/><rect x='80' y='70' width='180' height='46' rx='22' ry='22' fill='#0F172A' stroke='none' stroke-width='0' /><text x='170' y='99' font-size='22' fill='white' font-weight='800' text-anchor='middle' >本周一图</text><text x='80' y='190' font-size='72' fill='#111827' font-weight='900' text-anchor='start' >会说话 vs 会做事</text><text x='82' y='250' font-size='28' fill='#64748B' font-weight='600' text-anchor='start' >这一页就该是分析图，而不是情绪图。</text><rect x='760' y='120' width='760' height='620' rx='36' ry='36' fill='#FFFFFF' stroke='#E2E8F0' stroke-width='3' filter='url(#shadow)'/><line x1='900' y1='610' x2='900' y2='240' stroke='#CBD5E1' stroke-width='6' /><line x1='900' y1='610' x2='1380' y2='610' stroke='#CBD5E1' stroke-width='6' /><line x1='900' y1='430' x2='1380' y2='430' stroke='#E2E8F0' stroke-width='3' /><line x1='1140' y1='610' x2='1140' y2='240' stroke='#E2E8F0' stroke-width='3' /><text x='1140' y='670' font-size='28' fill='#475569' font-weight='700' text-anchor='middle' >会做事 →</text><text x='820' y='425' font-size='28' fill='#475569' font-weight='700' text-anchor='start' transform='rotate(-90 820 425)'>↑ 可靠性</text><rect x='1140' y='245' width='200' height='150' rx='24' ry='24' fill='#DCFCE7' stroke='#22C55E' stroke-width='4' /><text x='1240' y='312' font-size='34' fill='#14532D' font-weight='900' text-anchor='middle' >可靠交付</text><text x='1240' y='355' font-size='22' fill='#166534' font-weight='700' text-anchor='middle' >值得付费，也值得托付</text><rect x='960' y='430' width='180' height='135' rx='24' ry='24' fill='#FEE2E2' stroke='#EF4444' stroke-width='4' /><text x='1050' y='492' font-size='30' fill='#7F1D1D' font-weight='900' text-anchor='middle' >只会说</text><text x='1050' y='528' font-size='22' fill='#991B1B' font-weight='700' text-anchor='middle' >但不可靠</text><rect x='1180' y='470' width='180' height='96' rx='24' ry='24' fill='#E0F2FE' stroke='#0EA5E9' stroke-width='4' /><text x='1270' y='525' font-size='28' fill='#0C4A6E' font-weight='900' text-anchor='middle' >能做事</text><text x='1270' y='555' font-size='22' fill='#075985' font-weight='700' text-anchor='middle' >但还不稳</text><text x='82' y='838' font-size='22' fill='#6B7280' font-weight='600' text-anchor='start' >分析图风 · 不求炫，但求结论清楚。</text>
</svg>