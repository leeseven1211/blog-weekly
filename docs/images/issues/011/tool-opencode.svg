<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f6f4f2"/>
  <rect x="48" y="46" width="1104" height="583" rx="28" fill="#fefdfc" stroke="#ddd6cf" stroke-width="2"/>

  <rect x="84" y="84" width="132" height="38" rx="19" fill="#efe7df"/>
  <text x="150" y="109" text-anchor="middle" fill="#865f48" font-size="19" font-family="Arial, PingFang SC, sans-serif">开源工具</text>
  <text x="1036" y="109" text-anchor="end" fill="#7c7671" font-size="20" font-family="Arial, PingFang SC, sans-serif">看闭环，不只看生成</text>

  <rect x="84" y="146" width="700" height="410" rx="22" fill="#ffffff" stroke="#e1dad2" stroke-width="2"/>
  <rect x="84" y="146" width="700" height="62" rx="22" fill="#f8f6f3"/>
  <circle cx="116" cy="177" r="7" fill="#c4a894"/>
  <circle cx="140" cy="177" r="7" fill="#dcc7b9"/>
  <circle cx="164" cy="177" r="7" fill="#ebddd3"/>
  <text x="198" y="184" fill="#1f2328" font-size="24" font-weight="700" font-family="Arial, PingFang SC, sans-serif">OpenCodeInterpreter / OpenCodeInterpreter</text>

  <rect x="110" y="236" width="310" height="286" rx="18" fill="#121212"/>
  <text x="136" y="276" fill="#8cd0ff" font-size="21" font-family="Courier New, monospace">prompt</text>
  <text x="136" y="318" fill="#dce6f2" font-size="22" font-family="Courier New, monospace">write a quick data parser</text>
  <text x="136" y="374" fill="#7ee787" font-size="21" font-family="Courier New, monospace">code.py generated</text>
  <text x="136" y="416" fill="#dce6f2" font-size="21" font-family="Courier New, monospace">run tests...</text>
  <text x="136" y="458" fill="#f4c56b" font-size="21" font-family="Courier New, monospace">fixing one failed case</text>

  <rect x="454" y="236" width="300" height="286" rx="18" fill="#fbf8f5" stroke="#e4dbd2" stroke-width="2"/>
  <text x="482" y="278" fill="#886653" font-size="20" font-family="Arial, PingFang SC, sans-serif">这个项目最值得看的，不是会写代码，</text>
  <text x="482" y="314" fill="#886653" font-size="20" font-family="Arial, PingFang SC, sans-serif">而是把“写 → 跑 → 改”串成闭环。</text>
  <rect x="482" y="352" width="82" height="32" rx="16" fill="#f2e8de"/>
  <rect x="584" y="352" width="82" height="32" rx="16" fill="#f2e8de"/>
  <rect x="686" y="352" width="40" height="32" rx="16" fill="#f2e8de"/>
  <text x="523" y="373" text-anchor="middle" fill="#865f48" font-size="18" font-family="Arial, PingFang SC, sans-serif">write</text>
  <text x="625" y="373" text-anchor="middle" fill="#865f48" font-size="18" font-family="Arial, PingFang SC, sans-serif">run</text>
  <text x="706" y="373" text-anchor="middle" fill="#865f48" font-size="18" font-family="Arial, PingFang SC, sans-serif">fix</text>
  <text x="482" y="434" fill="#1f2328" font-size="24" font-family="Arial, PingFang SC, sans-serif">更适合拿来理解代码 agent</text>
  <text x="482" y="468" fill="#1f2328" font-size="24" font-family="Arial, PingFang SC, sans-serif">怎么闭环，而不是立即上生产。</text>

  <rect x="822" y="146" width="294" height="410" rx="22" fill="#ffffff" stroke="#ddd9d4" stroke-width="2"/>
  <text x="850" y="204" fill="#6a7480" font-size="20" font-family="Arial, PingFang SC, sans-serif">一句话定位</text>
  <text x="850" y="244" fill="#1f2328" font-size="28" font-weight="700" font-family="Arial, PingFang SC, sans-serif">把代码生成、执行、</text>
  <text x="850" y="280" fill="#1f2328" font-size="28" font-weight="700" font-family="Arial, PingFang SC, sans-serif">迭代修正打成闭环</text>

  <rect x="850" y="308" width="236" height="82" rx="18" fill="#f5eee7"/>
  <text x="874" y="344" fill="#865f48" font-size="20" font-family="Arial, PingFang SC, sans-serif">适合谁</text>
  <text x="874" y="374" fill="#1f2328" font-size="20" font-family="Arial, PingFang SC, sans-serif">研究、教学、理解 agent 工作流</text>

  <rect x="850" y="412" width="236" height="122" rx="18" fill="#faf7f4"/>
  <text x="874" y="448" fill="#6a7480" font-size="20" font-family="Arial, PingFang SC, sans-serif">你真正记住的亮点</text>
  <text x="874" y="482" fill="#1f2328" font-size="22" font-family="Arial, PingFang SC, sans-serif">write</text>
  <text x="874" y="510" fill="#1f2328" font-size="22" font-family="Arial, PingFang SC, sans-serif">run</text>
  <text x="874" y="538" fill="#1f2328" font-size="22" font-family="Arial, PingFang SC, sans-serif">debug</text>
</svg>
