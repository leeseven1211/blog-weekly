<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f4f1eb"/>
  <rect x="48" y="46" width="1104" height="583" rx="28" fill="#fffdfa" stroke="#d8d2c7" stroke-width="2"/>

  <rect x="84" y="84" width="170" height="38" rx="19" fill="#efe7da"/>
  <text x="169" y="109" text-anchor="middle" fill="#6f5a3d" font-size="19" font-family="Arial, PingFang SC, sans-serif">科技与 AI 动态 01</text>
  <text x="1000" y="109" text-anchor="end" fill="#7d7d7d" font-size="20" font-family="Arial, PingFang SC, sans-serif">OpenAI / 安全</text>

  <text x="84" y="190" fill="#1f2328" font-size="58" font-weight="700" font-family="Arial, PingFang SC, sans-serif">垂直安全模型开始抢占</text>
  <text x="84" y="258" fill="#1f2328" font-size="58" font-weight="700" font-family="Arial, PingFang SC, sans-serif">高价值行业入口</text>
  <text x="84" y="308" fill="#6b7280" font-size="28" font-family="Arial, PingFang SC, sans-serif">真正的变化，不是又多了一个模型，而是安全这类预算明确的场景开始单独拿模型。</text>

  <rect x="84" y="376" width="276" height="150" rx="22" fill="#f6f3ee" stroke="#d9d1c5" stroke-width="2"/>
  <rect x="462" y="376" width="276" height="150" rx="22" fill="#f2f7f2" stroke="#bcd8bc" stroke-width="2"/>
  <rect x="840" y="376" width="276" height="150" rx="22" fill="#f5f7fb" stroke="#c8d4ea" stroke-width="2"/>

  <text x="112" y="425" fill="#8a6a3b" font-size="22" font-family="Arial, PingFang SC, sans-serif">过去更看什么</text>
  <text x="112" y="468" fill="#1f2328" font-size="34" font-weight="700" font-family="Arial, PingFang SC, sans-serif">通用大模型</text>
  <text x="112" y="505" fill="#626b76" font-size="24" font-family="Arial, PingFang SC, sans-serif">谁更强，谁更会秀上限</text>

  <text x="490" y="425" fill="#2f6b3c" font-size="22" font-family="Arial, PingFang SC, sans-serif">现在更看什么</text>
  <text x="490" y="468" fill="#1f2328" font-size="34" font-weight="700" font-family="Arial, PingFang SC, sans-serif">安全工作流</text>
  <text x="490" y="505" fill="#626b76" font-size="24" font-family="Arial, PingFang SC, sans-serif">误报、解释、响应能不能接业务</text>

  <text x="868" y="425" fill="#3e5d8f" font-size="22" font-family="Arial, PingFang SC, sans-serif">抢的是什么</text>
  <text x="868" y="468" fill="#1f2328" font-size="34" font-weight="700" font-family="Arial, PingFang SC, sans-serif">企业预算位</text>
  <text x="868" y="505" fill="#626b76" font-size="24" font-family="Arial, PingFang SC, sans-serif">采购、续费和行业入口</text>

  <path d="M360 451 L430 451" stroke="#b8ab96" stroke-width="4" stroke-linecap="round"/>
  <path d="M430 451 L416 441" stroke="#b8ab96" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M430 451 L416 461" stroke="#b8ab96" stroke-width="4" stroke-linecap="round" fill="none"/>

  <path d="M738 451 L808 451" stroke="#adc0d6" stroke-width="4" stroke-linecap="round"/>
  <path d="M808 451 L794 441" stroke="#adc0d6" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M808 451 L794 461" stroke="#adc0d6" stroke-width="4" stroke-linecap="round" fill="none"/>

  <rect x="84" y="560" width="420" height="30" rx="15" fill="#efe7da"/>
  <text x="294" y="582" text-anchor="middle" fill="#6f5a3d" font-size="20" font-family="Arial, PingFang SC, sans-serif">一句话结论：安全场景不为炫技付费，只为可交付付费</text>
</svg>
